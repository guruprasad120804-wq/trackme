services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - /etc/tailscale-certs:/certs:ro
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      --ssl-keyfile=/certs/devpi.tail65c457.ts.net.key
      --ssl-certfile=/certs/devpi.tail65c457.ts.net.crt
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE; urllib.request.urlopen('https://localhost:8000/health', context=ctx)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  celery-worker:
    build: ./backend
    restart: always
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    build: ./backend
    restart: always
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - celerybeat_schedule:/tmp/celerybeat
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat/celerybeat-schedule
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_data:
  backend_uploads:
  celerybeat_schedule:
